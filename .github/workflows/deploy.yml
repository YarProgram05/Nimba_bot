name: Deploy Bot

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER || 'root' }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || vars.SERVER_PORT || '22' }}
      APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
      REPO_URL: ${{ secrets.REPO_URL || format('https://github.com/{0}.git', github.repository) }}
      BRANCH: ${{ secrets.DEPLOY_BRANCH || vars.DEPLOY_BRANCH || github.ref_name }}
      APP_DIR: ${{ secrets.APP_DIR || vars.APP_DIR || '/opt/nimba-bot' }}
      SERVICE_NAME: ${{ secrets.SERVICE_NAME || vars.SERVICE_NAME || 'nimba-bot' }}

    steps:
      - name: Validate deploy settings
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for key in SERVER_HOST SERVER_USER APP_ENV_FILE; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub Secrets/Vars: ${missing[*]}"
            echo "Configure them in: Settings -> Secrets and variables -> Actions"
            exit 1
          fi

          if [ -z "${SERVER_PASSWORD}" ] && [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "Configure one auth method: SERVER_PASSWORD or SSH_PRIVATE_KEY"
            exit 1
          fi

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_ENV_FILE: ${{ env.APP_ENV_FILE }}
          REPO_URL: ${{ env.REPO_URL }}
          BRANCH: ${{ env.BRANCH }}
          APP_DIR: ${{ env.APP_DIR }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          envs: APP_ENV_FILE,REPO_URL,BRANCH,APP_DIR,SERVICE_NAME
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${APP_DIR:-/opt/nimba-bot}"
            BRANCH="${BRANCH:-master}"
            SERVICE_NAME="${SERVICE_NAME:-nimba-bot}"

            apt-get update
            apt-get install -y git python3 python3-pip || true
            apt-get install -y python3-venv || apt-get install -y python3.12-venv

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            rm -rf .venv
            python3 -m venv .venv
            . .venv/bin/activate
            pip install --upgrade pip
            pip install -r market_bot/requirements.txt

            install -d "$APP_DIR/market_bot"
            printf "%s" "$APP_ENV_FILE" > "$APP_DIR/market_bot/.env"
            chmod 600 "$APP_DIR/market_bot/.env"

            cat > "/etc/systemd/system/${SERVICE_NAME}.service" <<EOF
            [Unit]
            Description=Nimba Telegram Bot
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=$APP_DIR/market_bot
            ExecStart=$APP_DIR/.venv/bin/python main.py
            Restart=always
            RestartSec=5
            User=root
            Environment=PYTHONUNBUFFERED=1

            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME"
            systemctl restart "$SERVICE_NAME"
            systemctl status "$SERVICE_NAME" --no-pager -l
